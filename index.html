<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Lifeline</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page centered-body">

    <div class="login-container">
        <!-- Left Side -->
        <div class="login-left">
            <img src="icon/logo.png" class="login-avatar">
            <h2>Lifeline Medical <br> Center</h2>
        </div>

        <!-- Right Side -->
        <div class="login-right">
            <div class="login-form-wrapper">
                <h3 id="form-title">Sign in to your Lifeline account</h3>
                <form id="auth-form">
                    <input type="hidden" id="action" name="action" value="login">

                    <div class="input-block">
                        <label for="loginId">User ID</label>
                        <input type="text" id="loginId" name="loginId" required>
                    </div>

                    <div class="input-block">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="message-box" id="message"></div>

                    <button type="submit" class="sign-in-btn" id="visible-submit">Sign in</button>

                    <p class="toggle-text">
                        <span id="toggle-prefix">Don't have an account? </span>
                        <a href="#" id="toggle-link">Sign Up</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- Global Footer -->
    <footer class="global-footer">
        <div class="footer-left">
            <div class="footer-avatar-small"></div>
            <div class="footer-brand">
                <h4>Lifeline</h4>
                <span>&copy; 2026 Lifeline Medical Center.</span>
                <span>All rights reserved.</span>
            </div>
        </div>

        <div class="footer-columns">
            <div class="footer-col">
                <h5>Support</h5>
                <ul>
                    <li><a href="helpCenter.html">Help Center</a></li>
                    <li><a href="faq.html">FAQ</a></li>
                    <li><a href="contactSupport.html">Contact Support</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h5>Legal</h5>
                <ul>
                    <li><a href="aboutUs.html">About Us</a></li>
                    <li><a href="companyProfile.html">Company Profile</a></li>
                    <li><a href="terms.html">Terms &amp; Condition</a></li>
                    <li><a href="privacy.html">Privacy Policy</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
